version: "SingleCausalLayer_1.0"
  # date: 18/01/2026
  # SingleCausalLayer: Simplified single-decoder architecture for S → X learning
  # Focus on learning a single causal relationship

model:
  
  model_object: "SingleCausalLayer"

  embed_dim:
    # Shared embedding dimensions for S and X
    d_model         : 128      # Shared model dimension
    val_emb_hidden  : 64       # Value embedding
    var_emb_hidden  : 32       # Variable ID embedding
    time_emb_hidden : 32       # Time embedding
  
  kwargs:
    model: ${model.model_object}
    
    # Shared embedding configuration (used for S and X)
    comps_embed_shared: "concat"  # Options: 'summation', 'concat', 'spatiotemporal'
    
    ds_embed_shared:
      setting:
        d_model: ${model.embed_dim.d_model}
      
      modules:
        - idx: 0  # Value dimension
          embed: "identity"
          label: "value"
          kwargs:
            input_dim: 1
            embedding_dim: ${model.embed_dim.val_emb_hidden}
        
        - idx: 1  # Variable ID
          embed: "nn_embedding"
          label: "variable"
          kwargs:
            num_embeddings: 50  # Adjust based on total number of variables
            embedding_dim: ${model.embed_dim.var_emb_hidden}
            padding_idx: 0
        
        - idx: 2  # Time/position
          embed: "time2vec"
          label: "time"
          kwargs:
            input_dim: 1
            embed_dim: ${model.embed_dim.time_emb_hidden}
        
        - idx: 0  # Mask for missing values
          embed: "mask"
          label: "value_missing"
          kwargs: {}
    
    # Attention configuration for Decoder (S → X)
    dec_cross_attention_type: "PhiSoftMax"       # S to X cross-attention (learns causal structure)
    dec_cross_mask_type: "Uniform"
    dec_self_attention_type: "ScaledDotProduct"  # X self-attention
    dec_self_mask_type: "Uniform"
    
    n_heads: 1  # Single head for interpretable attention patterns
    
    # Causal masking
    dec_causal_mask: True   # Causal mask for X self-attention
    
    # Model architecture
    dec_layers: 3  # Number of layers in Decoder
    activation: "gelu"
    norm: "layer"
    use_final_norm: True
    device: "cuda"
    
    # Model dimensions
    out_dim: 1         # Output dimension (single value prediction)
    d_ff: 512          # Feedforward dimension
    d_model: ${model.embed_dim.d_model}  # Shared model dimension
    d_qk: 64           # Query/key dimension per head
    
    # Sequence lengths (adjust based on your data)
    S_seq_len: 20      # Source sequence length
    X_seq_len: 30      # Intermediate sequence length
    
    # Dropout rates
    dropout_emb: 0.1
    dropout_attn_out: 0.1
    dropout_ff: 0.1
    
    # Decoder dropout
    dec_cross_dropout_qkv: 0.1
    dec_cross_attention_dropout: 0.0
    dec_self_dropout_qkv: 0.1
    dec_self_attention_dropout: 0.0


training:
  
  # Optimizer configuration
  optimizer: "adamw"  # Options: "adamw", "sgd"
  lr: 0.0001
  weight_decay: 0.01
  use_scheduler: False
  
  # Loss configuration
  loss_fn: "mse"
  
  # Training settings
  batch_size: 32
  max_epochs: 1000
  k_fold: 5
  seed: 42
  
  # Checkpointing
  save_ckpt_every_n_epochs: 100
  
  # Regularization
  log_entropy: True
  log_acyclicity: True
  log_sparsity: True
  gamma: 0.0         # Entropy regularization weight (0 = disabled)
  kappa: 0.0         # Acyclicity regularization weight (0 = disabled)
  lambda_sparse: 0.0 # Sparsity regularization for self-attention
  lambda_sparse_cross: 0.0  # Sparsity regularization for cross-attention
  
  # Freezing options for staged learning experiments
  freeze_embeddings: False   # Freeze embedding layers
  freeze_decoder: False      # Freeze entire decoder
  freeze_forecaster: False   # Freeze forecaster (de-embedding)
  
  # Hard mask configuration (for enforcing known structure)
  use_hard_masks: False
  # hard_mask_files:
  #   dec_cross: "mask_s_to_x.npy"  # Shape: (X_seq_len, S_seq_len)
  #   dec_self: "mask_x_self.npy"   # Shape: (X_seq_len, X_seq_len)


data:
  # Dataset configuration
  # Expected file format: .npz with keys 's', 'x', 'y'
  # Note: 'y' is loaded but ignored by SingleCausalForecaster
  
  dataset: "your_dataset_name"
  filename_input: "data.npz"  # Single .npz file containing s, x, y
  
  val_idx: 0  # Index of value dimension to blank during training
  
  # Sequence lengths (must match model kwargs)
  S_seq_len: 20
  X_seq_len: 30
  Y_seq_len: 40  # Required for dataloader, but Y is ignored in training
  
  # Data loading
  max_data_size: null  # Set to limit dataset size for debugging
  test_ds_ixd: null    # Test dataset indices file


special:
  mode: [
    # "early_stopping"  # Uncomment to enable early stopping
    # "debug_optimizer" # Uncomment to enable gradient logging
  ]


# =============================================================================
# NOTES FOR STAGED LEARNING EXPERIMENTS
# =============================================================================
#
# This config is designed for experimenting with different training strategies
# for the S → X causal relationship. Here are some suggested experiments:
#
# 1. BASELINE: Train everything together (default config)
#    - freeze_embeddings: False
#    - freeze_decoder: False  
#    - freeze_forecaster: False
#
# 2. TRAIN ATTENTION ONLY: 
#    First train the attention mechanism while keeping other parts frozen.
#    - freeze_embeddings: True (requires pre-trained embeddings)
#    - freeze_decoder: False
#    - freeze_forecaster: True (requires pre-trained forecaster)
#
# 3. TRAIN FORECASTER FIRST:
#    Train the de-embedding layer first with random attention.
#    - freeze_embeddings: True
#    - freeze_decoder: True
#    - freeze_forecaster: False
#
# 4. TWO-STAGE TRAINING:
#    Stage A: Train embeddings + decoder, freeze forecaster
#    Stage B: Freeze embeddings + decoder, train forecaster
#
# To implement staged training:
# 1. Run training with first set of freeze settings
# 2. Save checkpoint
# 3. Modify config to change freeze settings
# 4. Resume from checkpoint with new freeze settings
#
# Alternatively, use the freeze/unfreeze methods in SingleCausalForecaster:
#   forecaster.freeze_embeddings()
#   forecaster.unfreeze_embeddings()
#   forecaster.freeze_decoder()
#   forecaster.unfreeze_decoder()
#   forecaster.freeze_decoder_attention()  # Freeze only attention layers
#   forecaster.freeze_decoder_ffn()        # Freeze only FFN layers
#   forecaster.freeze_forecaster()
#   forecaster.unfreeze_forecaster()
# =============================================================================
