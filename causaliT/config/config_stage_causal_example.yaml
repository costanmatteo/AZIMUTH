version: "StageCausaliT_1.0"
  # date: 13/01/2026
  # StageCausaliT: Dual-decoder architecture with reversed attention order
  # Decoder 1: S → X reconstruction
  # Decoder 2: X → Y prediction

model:
  
  model_object: "StageCausaliT"

  embed_dim:
    # Shared embedding dimensions for all variables (S, X, Y)
    d_model         : 128      # Shared model dimension
    val_emb_hidden  : 64       # Value embedding
    var_emb_hidden  : 32       # Variable ID embedding
    time_emb_hidden : 32       # Time embedding
  
  kwargs:
    model: ${model.model_object}
    
    # Shared embedding configuration (used for S, X, and Y)
    comps_embed_shared: "concat"  # Options: 'summation', 'concat', 'spatiotemporal'
    
    ds_embed_shared:
      setting:
        d_model: ${model.embed_dim.d_model}
      
      modules:
        - idx: 0  # Value dimension
          embed: "identity"
          label: "value"
          kwargs:
            input_dim: 1
            embedding_dim: ${model.embed_dim.val_emb_hidden}
        
        - idx: 1  # Variable ID
          embed: "nn_embedding"
          label: "variable"
          kwargs:
            num_embeddings: 50  # Adjust based on total number of variables
            embedding_dim: ${model.embed_dim.var_emb_hidden}
            padding_idx: 0
        
        - idx: 2  # Time/position
          embed: "time2vec"
          label: "time"
          kwargs:
            input_dim: 1
            embed_dim: ${model.embed_dim.time_emb_hidden}
        
        - idx: 0  # Mask for missing values
          embed: "mask"
          label: "value_missing"
          kwargs: {}
    
    # Attention configuration for Decoder 1 (S → X)
    dec1_cross_attention_type: "LieAttention"      # S to X cross-attention
    dec1_cross_mask_type: "Uniform"
    dec1_self_attention_type: "ScaledDotProduct"   # X self-attention
    dec1_self_mask_type: "Uniform"
    
    # Attention configuration for Decoder 2 (X → Y)
    dec2_cross_attention_type: "LieAttention"      # X to Y cross-attention
    dec2_cross_mask_type: "Uniform"
    dec2_self_attention_type: "ScaledDotProduct"   # Y self-attention
    dec2_self_mask_type: "Uniform"
    
    n_heads: 4
    
    # Causal masking
    dec1_causal_mask: True   # Causal mask for X self-attention
    dec2_causal_mask: True   # Causal mask for Y self-attention
    
    # Model architecture
    d1_layers: 3  # Number of layers in Decoder 1
    d2_layers: 3  # Number of layers in Decoder 2
    activation: "gelu"
    norm: "layer"
    use_final_norm: True
    device: "cuda"
    
    # Model dimensions
    out_dim: 1         # Output dimension (single value prediction)
    d_ff: 512          # Feedforward dimension
    d_model: ${model.embed_dim.d_model}  # Shared model dimension
    d_qk: 64           # Query/key dimension per head
    
    # Sequence lengths (adjust based on your data)
    S_seq_len: 20      # Source sequence length
    X_seq_len: 30      # Intermediate sequence length
    Y_seq_len: 40      # Target sequence length
    
    # Dropout rates
    dropout_emb: 0.1
    dropout_attn_out: 0.1
    dropout_ff: 0.1
    
    # Decoder 1 dropout
    dec1_cross_dropout_qkv: 0.1
    dec1_cross_attention_dropout: 0.0
    dec1_self_dropout_qkv: 0.1
    dec1_self_attention_dropout: 0.0
    
    # Decoder 2 dropout
    dec2_cross_dropout_qkv: 0.1
    dec2_cross_attention_dropout: 0.0
    dec2_self_dropout_qkv: 0.1
    dec2_self_attention_dropout: 0.0


training:
  
  # Optimizer configuration
  optimizer: "adamw"  # Options: "adamw", "sgd"
  lr: 0.0001
  weight_decay: 0.01
  use_scheduler: False
  
  # Loss configuration
  loss_fn: "mse"
  loss_weight_x: 1.0  # Weight for X reconstruction loss
  loss_weight_y: 1.0  # Weight for Y prediction loss
  
  # Teacher forcing
  teacher_forcing: True  # Enable teacher forcing during training
  
  # Training settings
  batch_size: 32
  max_epochs: 1000
  k_fold: 5
  seed: 42
  
  # Checkpointing
  save_ckpt_every_n_epochs: 100
  
  # Regularization
  log_entropy: True
  log_acyclicity: True
  gamma: 0.0   # Entropy regularization weight (0 = disabled)
  kappa: 0.0   # Acyclicity regularization weight (0 = disabled)
  
  # Embedding freezing
  freeze_embeddings: False


data:
  # Dataset configuration
  # Note: This should be adapted to your specific dataset structure
  # Expected batch format: (S, X, Y) where each is (batch_size, seq_len, features)
  
  dataset: "your_dataset_name"
  filename_source: "S.npy"        # Source nodes file
  filename_intermediate: "X.npy"  # Intermediate variables file
  filename_target: "Y.npy"        # Target variables file
  
  val_idx: 0  # Index of value dimension to blank during training
  
  # Feature indices for S, X, Y
  # Adjust these based on your data structure
  features:
    S:
      value: 0
      variable: 1
      time: 2
    
    X:
      value: 0
      variable: 1
      time: 2
    
    Y:
      value: 0
      variable: 1
      time: 2
  
  # Data loading
  max_data_size: null  # Set to limit dataset size for debugging
  test_ds_idx: "test_ds_idx.npy"


special:
  mode: [
    # "early_stopping"  # Uncomment to enable early stopping
  ]


# Notes for users:
# ----------------
# 1. Adjust sequence lengths (S_seq_len, X_seq_len, Y_seq_len) to match your data
# 2. Modify embedding dimensions based on your vocabulary sizes
# 3. Set teacher_forcing to True during training, will be automatically disabled during validation
# 4. Loss weights can be adjusted to prioritize X reconstruction or Y prediction
# 5. For LieAttention, ensure sequence lengths are properly set for DAG initialization
# 6. The shared embedding system ensures consistent representations across all variables
