# NoiseAwareSingleCausalLayer: Example configuration
# 
# This config demonstrates the noise-aware causal transformer with:
# - Ambient noise (σ_A): Environmental variability in physical states
# - Reading noise (σ_R): Sensor measurement uncertainty
# - Gaussian NLL training for uncertainty quantification
# - SVFA factorization (required)
#
# Key Design Choices (marked for paper):
# - Per-node noise: σ_A[j] and σ_R[i] are node-specific learnable parameters
# - Noise before W_v: Ambient noise is injected in embedding space (before value projection)
#
# References:
# - docs/noise_aware_transformer_summary.md
# - docs/NOISE_LEARNING.md

experiment:
  d_model_set: 24
  dec_layers: 1
  n_heads: 1
  d_ff: 48
  d_qk: 32  # Must be >= d_model for orthogonal key projection (was 12)
  dropout: 0.0
  lr: 0.001
  batch_size: 64
  max_epochs: 100
  # Recommended attention types for noise-aware model:
  # - Self-attention: LieAttention (for DAG learning with causal structure)
  # - Cross-attention: CausalCrossAttention or ScaledDotProduct
  dec_self_attention_type: "LieAttention"
  dec_cross_attention_type: "CausalCrossAttention"

model:
  model_object: "NoiseAwareSingleCausalLayer"

  embed_dim:
    d_model_set: ${experiment.d_model_set}
    val_emb_hidden: ${experiment.d_model_set}
    var_emb_hidden: ${experiment.d_model_set}
  
  kwargs:
    model: ${model.model_object}
    
    # S Embedding (Orthogonal - frozen, deterministic SET variables)
    ds_embed_S:
      num_variables: ${data.S_seq_len}
      value_input_dim: 1
      value_idx: ${data.feature_indices.value}
      var_idx: ${data.feature_indices.variable}
      freeze: true  # S variables are deterministic (SET), not measurements
    
    # X Embedding (Learnable - SVFA mode returns tuple (X_struct, X_val))
    ds_embed_X:
      setting:
        d_model: ${model.embed_dim.d_model_set}
        sparse_grad: False
      modules:
        - idx: ${data.feature_indices.value}
          embed: "linear"
          label: "value"
          kwargs:
            input_dim: 1
            embedding_dim: ${model.embed_dim.val_emb_hidden}
        - idx: ${data.feature_indices.variable}
          embed: "nn_embedding"
          label: "variable"
          kwargs:
            num_embeddings: ${data.num_embeddings_X}  # Auto-populated: n_input + 1 (non-shared)
            embedding_dim: ${model.embed_dim.var_emb_hidden}
            padding_idx: 0
            sparse: ${model.kwargs.ds_embed_X.setting.sparse_grad}
            max_norm: 1
        - idx: ${data.feature_indices.value}
          embed: "mask"
          label: "value_missing"
          kwargs: {}
    
    comps_embed_X: "summation"
    
    # Attention configuration
    # Cross-attention: S → X (deterministic source to intermediate)
    dec_cross_attention_type: ${experiment.dec_cross_attention_type}
    dec_cross_mask_type: "Uniform"
    # Self-attention: X → X (mixing noisy physical states)
    dec_self_attention_type: ${experiment.dec_self_attention_type}
    dec_self_mask_type: "Uniform"
    
    n_heads: ${experiment.n_heads}
    dec_causal_mask: False
    dec_layers: ${experiment.dec_layers}
    activation: "gelu"
    norm: "layer"
    use_final_norm: True
    device: "cuda"
    
    out_dim: 1
    d_ff: ${experiment.d_ff}
    d_model: ${model.embed_dim.d_model_set}
    d_qk: ${experiment.d_qk}
    
    S_seq_len: ${data.S_seq_len}
    X_seq_len: ${data.X_seq_len}
    
    # Dropout rates
    dropout_emb: ${experiment.dropout}
    dropout_attn_out: ${experiment.dropout}
    dropout_ff: ${experiment.dropout}
    dec_cross_dropout_qkv: ${experiment.dropout}
    dec_cross_attention_dropout: ${experiment.dropout}
    dec_self_dropout_qkv: ${experiment.dropout}
    dec_self_attention_dropout: ${experiment.dropout}
    
    # DAG Parameterization
    # Options: "independent", "antisymmetric", "gated", or null
    dag_parameterization_self: "antisymmetric"  # P(i→j) + P(j→i) = 1 for self-attention
    dag_parameterization_cross: "independent"   # Cross-attention is non-square
    
    # Key Projection Type
    # Orthogonal projection preserves inner products between embeddings.
    # When S uses OrthogonalMaskEmbedding, use "orthogonal" for cross-attention
    # to ensure orthogonal S embeddings produce orthogonal keys.
    # Options: "linear" (standard), "orthogonal" (rotation + optional scaling)
    key_projection_type_cross: "orthogonal"  # Preserve S orthogonality in cross-attention
    key_projection_type_self: "linear"       # X is not orthogonal, use standard projection
    orthogonal_scale: true                   # Include learnable scale in orthogonal projection
    orthogonal_init_scale: 1.0               # Initial scale value
    
    # ==========================================
    # NOISE-AWARE SPECIFIC PARAMETERS
    # ==========================================
    
    # Ambient noise (σ_A): Environmental variability
    # - Models temperature fluctuations, system drift, imperfect actuation
    # - Injected AFTER cross-attention, BEFORE self-attention mixing
    # Design Choice: Per-node noise σ_A[j]
    init_sigma_A: 0.01  # Initial value (small = near-deterministic start)
    
    # Reading noise (σ_R): Measurement uncertainty
    # - Models sensor noise, ADC quantization, measurement error
    # - Added to final output prediction
    # Design Choice: Per-node noise σ_R[i]
    init_sigma_R: 0.05  # Initial value
    
    # Per-dimension noise (alternative to per-node)
    # If True, σ_A[j, d] varies across embedding dimensions
    noise_per_dimension: false  # Design Choice: Per-node only
    
    # Variance propagation tracking (for analysis)
    # Tracks: Var(X_i) = Σ_j α_ij² σ_A[j]² + σ_R[i]²
    track_variance: false


training:
  optimizer: "adamw"
  lr: ${experiment.lr}
  weight_decay: 0.01
  use_scheduler: True  # Recommended for NLL training
  
  # Loss function: Gaussian NLL
  # L = (x - μ)² / (2τ²) + log(τ)
  # The log(τ) term naturally penalizes large variance
  loss_fn: "gaussian_nll"  # This is implicit in NoiseAwareCausalForecaster
  
  # NLL-specific settings
  nll_eps: 1.0e-6  # Numerical stability for variance clamping
  nll_full: false  # Include constant term (0.5 * log(2π))
  
  batch_size: ${experiment.batch_size}
  max_epochs: ${experiment.max_epochs}
  k_fold: 5
  seed: 42
  save_ckpt_every_n_epochs: 10
  
  # ==========================================
  # LOGGING
  # ==========================================
  log_entropy: True
  log_acyclicity: True
  log_sparsity: True
  log_hsic: True
  log_decisiveness: True
  log_l1_scores: True
  log_noise_params: True  # Log σ_A, σ_R during training
  
  # ==========================================
  # REGULARIZATION
  # ==========================================
  
  # Entropy regularization - encourages focused attention
  lambda_entropy_self: 0.0
  lambda_entropy_cross: 0.0
  
  # Acyclicity (NOTEARS) - enforces DAG structure
  kappa: 0.0
  
  # Sparsity (L1 on edge probabilities)
  lambda_sparse: 0.0
  lambda_sparse_cross: 0.0
  
  # HSIC - encourages independence between S and residuals
  lambda_hsic: 0.0
  hsic_sigma: 1.0
  
  # Decisiveness - pushes edge probabilities away from 0.5
  lambda_decisive: 0.0
  lambda_decisive_cross: 0.0
  lambda_tau: 0.0
  target_tau: 0.1
  
  # L1 on attention scores
  lambda_l1_self_scores: 0.0
  lambda_l1_cross_scores: 0.0
  
  # KL prior regularization
  lambda_kl: 1.0
  adaptive_z_scaling: true
  
  # ==========================================
  # NOISE-SPECIFIC REGULARIZATION (optional)
  # ==========================================
  
  # Prior on noise parameters (for identifiability)
  # KL divergence from prior values to prevent degeneracy
  # where σ_A and σ_R trade off without changing likelihood
  lambda_noise_prior: 0.0  # Set > 0 if identifiability is an issue
  prior_sigma_A: 0.01  # Prior mean for σ_A
  prior_sigma_R: 0.05  # Prior mean for σ_R
  
  # Hard masks (ground-truth DAG structure)
  use_hard_masks: false
  hard_mask_files:
    dec_cross: "dec1_cross_att_mask.csv"
    dec_self: "dec1_self_att_mask.csv"


data:
  dataset: "scm6"
  filename_input: "ds.npz"
  val_idx: ${data.feature_indices.value}
  test_ds_ixd: null
  max_data_size: null
  # NOTE: All fields below are AUTO-POPULATED from dataset_metadata.json
  # These placeholder values are overwritten at runtime by populate_seq_lengths_from_dataset()
  # See docs/DATASET_METADATA.md for details
  S_seq_len: null  # Auto-populated from dataset_metadata.json
  X_seq_len: null  # Auto-populated from dataset_metadata.json
  Y_seq_len: null  # Auto-populated from dataset_metadata.json
  # Embedding dimensions (auto-populated):
  num_embeddings_X: null     # n_input + 1 (non-shared X stage, includes padding)
  num_embeddings_Y: null     # n_target + 1 (non-shared Y stage)
  num_embeddings_shared: null  # n_source + n_input + n_target + 1 (shared embedding)
  # Feature indices (auto-populated from dataset_metadata.json):
  # For SCM datasets: {value: 0, variable: 1}
  # For real-world datasets: may vary (e.g., dyconex has additional features)
  feature_indices:
    value: 0     # Column index for observation values
    variable: 1  # Column index for variable IDs


special:
  mode: []
