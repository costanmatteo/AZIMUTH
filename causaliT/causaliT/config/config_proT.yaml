# ProT (Process Transformer): Encoder-decoder architecture
#
# Base transformer for sequence-to-scalar prediction.
# Encoder processes input variables (X), decoder predicts target (Y).
# Data format: (X, Y) via ProcessDataModule.
#
# Feature indices: {value: 0, variable: 1} — compatible with SCM datasets
# and azimuth_surrogate data generated by generate_dataset.py.
#
# d_model_enc and d_model_dec are auto-derived by update_config()
# based on comps_embed_enc/dec mode (summation vs concat).

experiment:
  d_model_set: 32
  e_layers: 2
  d_layers: 1
  n_heads: 4
  d_ff: 64
  d_qk: 8
  dropout: 0.3
  lr: 0.0005
  batch_size: 32
  max_epochs: 200

model:
  model_object: "proT"

  embed_dim:
    d_model_set: ${experiment.d_model_set}
    enc_val_emb_hidden: ${experiment.d_model_set}
    enc_var_emb_hidden: ${experiment.d_model_set}
    dec_val_emb_hidden: ${experiment.d_model_set}
    dec_var_emb_hidden: ${experiment.d_model_set}

  kwargs:
    model: ${model.model_object}

    # =========================================================================
    # ENCODER EMBEDDING (input X)
    # =========================================================================
    ds_embed_enc:
      setting:
        d_model: ${experiment.d_model_set}
        sparse_grad: False
      modules:
        - idx: ${data.feature_indices.value}
          embed: "linear"
          label: "value"
          kwargs:
            input_dim: 1
            embedding_dim: ${model.embed_dim.enc_val_emb_hidden}
        - idx: ${data.feature_indices.variable}
          embed: "nn_embedding"
          label: "variable"
          kwargs:
            num_embeddings: ${data.num_embeddings_X}
            embedding_dim: ${model.embed_dim.enc_var_emb_hidden}
            padding_idx: 0
            sparse: False
            max_norm: 1
        - idx: ${data.feature_indices.value}
          embed: "mask"
          label: "value_missing"
          kwargs: {}

    comps_embed_enc: "summation"

    # =========================================================================
    # DECODER EMBEDDING (target Y)
    # =========================================================================
    ds_embed_dec:
      setting:
        d_model: ${experiment.d_model_set}
        sparse_grad: False
      modules:
        - idx: ${data.feature_indices.value}
          embed: "linear"
          label: "value"
          kwargs:
            input_dim: 1
            embedding_dim: ${model.embed_dim.dec_val_emb_hidden}
        - idx: ${data.feature_indices.value}
          embed: "mask"
          label: "value_missing"
          kwargs: {}

    comps_embed_dec: "summation"

    # =========================================================================
    # ATTENTION CONFIGURATION
    # =========================================================================
    enc_attention_type: "ScaledDotProduct"
    enc_mask_type: "Uniform"
    dec_self_attention_type: "ScaledDotProduct"
    dec_self_mask_type: "Uniform"
    dec_cross_attention_type: "ScaledDotProduct"
    dec_cross_mask_type: "Uniform"
    n_heads: ${experiment.n_heads}
    enc_causal_mask: False
    dec_causal_mask: False

    # =========================================================================
    # MODEL ARCHITECTURE
    # =========================================================================
    e_layers: ${experiment.e_layers}
    d_layers: ${experiment.d_layers}
    activation: "gelu"
    norm: "batch"
    use_final_norm: True
    device: "cpu"

    out_dim: 1
    d_ff: ${experiment.d_ff}
    d_qk: ${experiment.d_qk}

    # Sequence lengths (auto-populated from dataset_metadata.json)
    X_seq_len: ${data.X_seq_len}
    Y_seq_len: ${data.Y_seq_len}

    # Dropout rates
    dropout_emb: ${experiment.dropout}
    dropout_data: ${experiment.dropout}
    dropout_attn_out: ${experiment.dropout}
    dropout_ff: ${experiment.dropout}
    enc_dropout_qkv: ${experiment.dropout}
    enc_attention_dropout: ${experiment.dropout}
    dec_self_dropout_qkv: ${experiment.dropout}
    dec_self_attention_dropout: ${experiment.dropout}
    dec_cross_dropout_qkv: ${experiment.dropout}
    dec_cross_attention_dropout: ${experiment.dropout}


training:
  optimizer: "adamw"
  lr: ${experiment.lr}
  weight_decay: 0.01
  use_scheduler: True
  loss_fn: "mse"

  batch_size: ${experiment.batch_size}
  max_epochs: ${experiment.max_epochs}
  k_fold: 5
  seed: 42
  save_ckpt_every_n_epochs: 50

  # Logging
  log_entropy: False
  log_acyclicity: False

  # Regularization
  gamma: 0.0       # Entropy regularization weight
  kappa: 0.0       # Acyclicity (NOTEARS) weight

  # Masks
  use_hard_masks: false
  use_in_context_masks: false


data:
  dataset: "scm1_linear_gaussian"
  filename_input: "ds.npz"
  filename_target: "ds.npz"
  val_idx: ${data.feature_indices.value}
  test_ds_ixd: null
  max_data_size: null

  # Auto-populated from dataset_metadata.json
  S_seq_len: null
  X_seq_len: null
  Y_seq_len: null
  num_embeddings_X: null
  num_embeddings_Y: null
  num_embeddings_shared: null

  feature_indices:
    value: 0
    variable: 1


special:
  mode: []


evaluation:
  functions:
    - "eval_train_metrics"
